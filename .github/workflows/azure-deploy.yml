name: Deploy All Services to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

# ────────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build & Deploy main app (Express GraphQL + React build)
# Azure App Service name stored in: vars.AZURE_MAIN_APP_NAME
# Publish profile stored in:        secrets.AZURE_MAIN_PUBLISH_PROFILE
# ────────────────────────────────────────────────────────────────────────────────
jobs:
  deploy-main:
    name: Main App (Express + React)
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json # FIX 1: explicit path for monorepo cache

      - name: Install root dependencies
        run: npm install --omit=dev --legacy-peer-deps || npm install --omit=dev --force

      - name: Install client dependencies and build
        working-directory: client
        run: |
          npm install --legacy-peer-deps || npm install --force
          npm run build

      - name: Create deployment zip (excludes dev files)
        run: |
          zip -r main-release.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "client/src/*" \
            --exclude "client/public/*" \
            --exclude "client/node_modules/*" \
            --exclude "services/*"

      - name: Deploy to Azure Web App
        id: deploy
        # FIX 2: env block was missing entirely in deploy-main — PUBLISH_PROFILE was never set
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_MAIN_PUBLISH_PROFILE }}
        run: |
          # FIX 3: write heredoc to a temp file to avoid subshell/quoting issues
          cat > /tmp/extract_creds.py << 'EOF'
          import xml.etree.ElementTree as ET
          import os, sys

          profile_xml = os.environ['PUBLISH_PROFILE']
          root = ET.fromstring(profile_xml)

          for profile in root.findall('.//publishProfile'):
              username = profile.get('userName')
              password = profile.get('userPWD')
              if username and password:
                  print(f"{username}:{password}")
                  sys.exit(0)

          sys.exit(1)
          EOF

          creds=$(python3 /tmp/extract_creds.py)

          USERNAME=$(echo "$creds" | cut -d: -f1)
          PASSWORD=$(echo "$creds" | cut -d: -f2-)

          if [ -z "$USERNAME" ] || [ -z "$PASSWORD" ]; then
            echo "Error: Failed to extract credentials"
            exit 1
          fi

          # FIX 4: capture HTTP status code and fail the step if deploy didn't return 200
          HTTP_STATUS=$(curl -s -o /tmp/deploy_output.txt -w "%{http_code}" \
            -X POST -u "$USERNAME:$PASSWORD" \
            -H "Content-Type: application/zip" \
            --data-binary "@main-release.zip" \
            "https://${{ vars.AZURE_MAIN_APP_NAME }}.scm.azurewebsites.net/api/zipdeploy")

          echo "Deploy response (HTTP $HTTP_STATUS):"
          cat /tmp/deploy_output.txt

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "202" ]; then
            echo "Error: Deployment failed with HTTP $HTTP_STATUS"
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy Bio Service (Node.js/Express)
  # Azure App Service name stored in: vars.AZURE_BIO_APP_NAME
  # Publish profile stored in:        secrets.AZURE_BIO_PUBLISH_PROFILE
  # ────────────────────────────────────────────────────────────────────────────────
  deploy-bio-service:
    name: Bio Service (Node.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install bio service dependencies
        working-directory: services/bio-service
        run: npm install --omit=dev --legacy-peer-deps || npm install --omit=dev --force

      - name: Create deployment zip
        working-directory: services/bio-service
        run: zip -r bio-release.zip . --exclude "*.git*"

      - name: Deploy to Azure Web App
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_BIO_PUBLISH_PROFILE }}
        run: |
          cat > /tmp/extract_creds.py << 'EOF'
          import xml.etree.ElementTree as ET
          import os, sys

          profile_xml = os.environ['PUBLISH_PROFILE']
          root = ET.fromstring(profile_xml)

          for profile in root.findall('.//publishProfile'):
              username = profile.get('userName')
              password = profile.get('userPWD')
              if username and password:
                  print(f"{username}:{password}")
                  sys.exit(0)

          sys.exit(1)
          EOF

          creds=$(python3 /tmp/extract_creds.py)

          USERNAME=$(echo "$creds" | cut -d: -f1)
          PASSWORD=$(echo "$creds" | cut -d: -f2-)

          if [ -z "$USERNAME" ] || [ -z "$PASSWORD" ]; then
            echo "Error: Failed to extract credentials"
            exit 1
          fi

          # FIX 5: zip is created inside services/bio-service/ so path must be relative to that dir
          HTTP_STATUS=$(curl -s -o /tmp/deploy_output.txt -w "%{http_code}" \
            -X POST -u "$USERNAME:$PASSWORD" \
            -H "Content-Type: application/zip" \
            --data-binary "@services/bio-service/bio-release.zip" \
            "https://${{ vars.AZURE_BIO_APP_NAME }}.scm.azurewebsites.net/api/zipdeploy")

          echo "Deploy response (HTTP $HTTP_STATUS):"
          cat /tmp/deploy_output.txt

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "202" ]; then
            echo "Error: Deployment failed with HTTP $HTTP_STATUS"
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy Project Service (Python FastAPI)
  # Azure App Service name stored in: vars.AZURE_PROJECTS_APP_NAME
  # Publish profile stored in:        secrets.AZURE_PROJECTS_PUBLISH_PROFILE
  # ────────────────────────────────────────────────────────────────────────────────
  deploy-project-service:
    name: Project Service (Python FastAPI)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: services/project-service
        run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Create deployment zip
        working-directory: services/project-service
        run: zip -r projects-release.zip . --exclude "*.git*" --exclude "venv/*" --exclude "__pycache__/*"

      - name: Deploy to Azure Web App
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_PROJECTS_PUBLISH_PROFILE }}
        run: |
          cat > /tmp/extract_creds.py << 'EOF'
          import xml.etree.ElementTree as ET
          import os, sys

          profile_xml = os.environ['PUBLISH_PROFILE']
          root = ET.fromstring(profile_xml)

          for profile in root.findall('.//publishProfile'):
              username = profile.get('userName')
              password = profile.get('userPWD')
              if username and password:
                  print(f"{username}:{password}")
                  sys.exit(0)

          sys.exit(1)
          EOF

          creds=$(python3 /tmp/extract_creds.py)

          USERNAME=$(echo "$creds" | cut -d: -f1)
          PASSWORD=$(echo "$creds" | cut -d: -f2-)

          if [ -z "$USERNAME" ] || [ -z "$PASSWORD" ]; then
            echo "Error: Failed to extract credentials"
            exit 1
          fi

          HTTP_STATUS=$(curl -s -o /tmp/deploy_output.txt -w "%{http_code}" \
            -X POST -u "$USERNAME:$PASSWORD" \
            -H "Content-Type: application/zip" \
            --data-binary "@services/project-service/projects-release.zip" \
            "https://${{ vars.AZURE_PROJECTS_APP_NAME }}.scm.azurewebsites.net/api/zipdeploy")

          echo "Deploy response (HTTP $HTTP_STATUS):"
          cat /tmp/deploy_output.txt

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "202" ]; then
            echo "Error: Deployment failed with HTTP $HTTP_STATUS"
            exit 1
          fi
