<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <link rel="icon" href="/photobyvinay/favicon.ico"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="theme-color" content="#000000"/>
    <meta name="description" content="Contact Photo by Vinay"/>
    <title>Contact - Photo by Vinay</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&family=Rubik:ital,wght@0,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rubik', sans-serif; line-height: 1.6; color: #333; }
        header { background: #1a1a1a; color: white; padding: 1rem; text-align: center; }
        header a { color: white; text-decoration: none; margin: 0 1rem; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
        h1 { color: #1a1a1a; margin-bottom: 2rem; }
        .contact-form { background: #f9f9f9; padding: 2rem; border-radius: 8px; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input, textarea { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-family: 'Rubik', sans-serif; }
        textarea { resize: vertical; min-height: 150px; }
        button { background: #007bff; color: white; padding: 0.75rem 2rem; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #0056b3; }
        .contact-info { margin-top: 2rem; }
        .contact-info p { margin: 0.5rem 0; }
    </style>
</head>
<body>
    <header>
        <h1>Photo by Vinay</h1>
        <nav>
            <a href="/photobyvinay/">Home</a>
            <a href="/photobyvinay/about.html">About</a>
            <a href="/photobyvinay/services.html">Services</a>
            <a href="/photobyvinay/contact.html">Contact</a>
            <a href="/photobyvinay/login.html">Login</a>
        </nav>
    </header>
    <div class="container">
        <h1>Get in Touch</h1>
        <p>Have a project in mind? I'd love to hear from you. Fill out the form below or reach out directly.</p>
        <div class="contact-form">
            <form>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </div>
        <div class="contact-info">
            <h2>Other Ways to Connect</h2>
            <p><strong>Email:</strong> contact@photobyvinay.com</p>
            <p><strong>Phone:</strong> +1 (XXX) XXX-XXXX</p>
            <p><strong>Follow Me:</strong> Instagram | Facebook | Twitter</p>
        </div>
    </div>
</body>
</html>
